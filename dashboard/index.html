<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="app.title">AI 团队工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="task-list">
          <div class="panel-header">
            <h2 data-i18n="app.taskRecords">任务记录</h2>
            <button id="refresh-runs" type="button" class="ghost" data-i18n="app.refresh">刷新</button>
          </div>
          <div id="runs"></div>
        </aside>

        <section class="flow-main">
          <div class="summary-band">
            <div>
              <p class="eyebrow" data-i18n="app.currentTask">当前任务</p>
              <h2 id="current-task" data-i18n="app.emptySelection">选择或新建一个任务</h2>
              <p id="task-headline" class="summary-text"></p>
            </div>
            <div id="status-pill" class="status-pill status-muted" data-i18n="status.not_started.label">未开始</div>
          </div>

          <section id="flow-node-detail" class="flow-node-detail" tabindex="-1">
            <div class="flow-detail-header">
              <div>
                <p class="eyebrow" id="flow-node-kicker" data-i18n="flow.detailTitle">流程详情</p>
                <h2 id="flow-node-title" data-i18n="app.emptySelection">选择或新建一个任务</h2>
                <p id="flow-node-summary" class="summary-text"></p>
              </div>
              <span id="flow-node-status" class="mini-status status-muted" data-i18n="status.not_started.label">未开始</span>
            </div>

            <div class="flow-detail-grid">
              <section class="flow-detail-card">
                <h3 data-i18n="flow.insights">关键进展</h3>
                <div id="flow-node-insights" class="quality-list"></div>
              </section>

              <section class="flow-detail-card">
                <h3 data-i18n="flow.gates">关联关卡</h3>
                <div id="flow-node-gates" class="quality-list"></div>
              </section>

              <section class="flow-detail-card flow-actions-card">
                <h3 data-i18n="flow.actions">可执行动作</h3>
                <div id="flow-node-actions" class="button-group"></div>
              </section>
            </div>

            <section id="flow-node-specifics" class="flow-node-specifics"></section>

            <section class="flow-artifact-card">
              <div class="panel-header">
                <h3 data-i18n="flow.artifacts">节点产物</h3>
                <button id="flow-all-artifacts-action" type="button" class="ghost small" data-i18n="flow.all_artifacts">全部产物</button>
              </div>
              <div class="flow-artifact-grid">
                <div id="flow-artifact-actions" class="artifact-list"></div>
                <div class="flow-artifact-preview-pane">
                  <div class="selected-artifact">
                    <div>
                      <h3 id="selected-artifact-title" data-i18n="actions.noDeliverables">暂无可查看产物</h3>
                      <p id="selected-artifact-description" class="meta"></p>
                    </div>
                    <span id="selected-artifact-status" class="mini-status status-muted" data-i18n="actions.artifactPending">未生成</span>
                  </div>
                  <div id="flow-artifact-preview" class="artifact-preview"></div>
                </div>
              </div>
            </section>

            <section class="flow-engineering-evidence">
              <div class="panel-header">
                <h3 data-i18n="flow.engineeringEvidence">工程证据</h3>
              </div>
              <div id="flow-engineering-evidence" class="flow-evidence-grid"></div>
            </section>
          </section>

          <section class="request-panel" aria-label="需求提交">
            <div class="request-copy">
              <p class="eyebrow">AI native</p>
              <h1 data-i18n="app.title">AI 团队工作台</h1>
              <p data-i18n="app.subtitle">输入一个业务需求，让 AI 团队完成理解、方案、实现、检查和交付。</p>
            </div>
            <form id="run-form" class="run-form">
              <label class="brief-label" for="brief" data-i18n="app.briefLabel">你想让 AI 团队完成什么？</label>
              <textarea id="brief" name="brief" rows="3" data-i18n-placeholder="app.briefPlaceholder"></textarea>
              <div class="config-grid">
                <label>
                  <span data-i18n="advanced.domain">任务类型</span>
                  <input id="domain" name="domain" value="web_monitoring" />
                </label>
                <label>
                  <span data-i18n="advanced.executor">执行方式</span>
                  <select id="executor" name="executor">
                    <option value="codex" data-i18n="advanced.codex">AI coding</option>
                    <option value="deterministic" data-i18n="advanced.deterministic">本地演示</option>
                  </select>
                </label>
                <label>
                  <span data-i18n="advanced.provider">模型服务</span>
                  <select id="provider" name="provider">
                    <option value="default">default</option>
                    <option value="aicodemirror">aicodemirror</option>
                  </select>
                </label>
                <label>
                  <span data-i18n="advanced.model">模型</span>
                  <input id="model" name="model" value="gpt-5.5" />
                </label>
              </div>
              <div class="form-actions">
                <button type="submit" data-i18n="app.startButton">交给 AI 团队处理</button>
              </div>
            </form>
          </section>

          <div class="flow-hidden-actions" hidden>
            <button id="acceptance-action" type="button" data-i18n="acceptance.confirmButton">确认采纳并运行验收</button>
            <div id="acceptance-summary" data-i18n="acceptance.notStarted">确认后会应用本次代码变更，并自动运行全量测试。</div>
            <div id="acceptance-steps"></div>
            <div id="acceptance-next-action"></div>
            <button id="release-readiness-action" type="button" data-i18n="releaseReadiness.generateButton">生成发布准备报告</button>
            <div id="release-readiness-summary"></div>
            <div id="release-readiness-gates"></div>
            <div id="release-readiness-pr"></div>
            <button id="github-pr-action" type="button" data-i18n="githubPr.createDraftButton">推送当前分支并创建 Draft PR</button>
            <button id="github-ci-action" type="button" data-i18n="githubPr.refreshCiButton">刷新 PR/CI 状态</button>
            <div id="github-pr-summary"></div>
            <div id="github-pr-info"></div>
            <div id="github-ci-info"></div>
            <button id="staging-readiness-action" type="button" data-i18n="stagingReadiness.generateButton">生成 Staging 准备判断</button>
            <div id="staging-readiness-summary"></div>
            <div id="staging-readiness-gates"></div>
            <div id="staging-readiness-evidence"></div>
            <button id="staging-rehearsal-action" type="button" data-i18n="stagingRehearsal.runButton">运行 Staging 本地演练</button>
            <div id="staging-rehearsal-summary"></div>
            <div id="staging-rehearsal-details"></div>
            <button id="production-readiness-action" type="button" data-i18n="productionReadiness.generateButton">生成生产准备判断</button>
            <div id="production-readiness-summary"></div>
            <div id="production-readiness-gates"></div>
            <div id="production-readiness-evidence"></div>
            <div id="next-actions"></div>
          </div>
        </section>

        <aside class="flow-timeline" tabindex="-1">
          <div class="panel-header">
            <h2 data-i18n="flow.timelineTitle">任务进展</h2>
          </div>
          <div id="flow-nodes" class="flow-node-list"></div>
        </aside>
      </section>
    </main>
    <script src="/business_view.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
