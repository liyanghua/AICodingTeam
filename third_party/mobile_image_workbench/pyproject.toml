[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "mobile-image-workbench"
version = "0.1.0"
description = "Business-facing mobile image collection workbench"
requires-python = ">=3.11,<3.14"
readme = "README.md"

[project.scripts]
mobile-image-workbench = "mobile_image_workbench.cli:main"

[tool.setuptools]
package-dir = {"" = "backend"}
packages = ["mobile_image_workbench"]
