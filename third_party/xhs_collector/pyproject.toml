[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "xhs-collector"
version = "0.1.0"
description = "Manual-login Xiaohongshu image collector built on Mobilerun"
requires-python = ">=3.11,<3.14"
readme = "README.md"

[project.scripts]
xhs-collector = "xhs_collector.cli:main"

[tool.setuptools]
packages = ["xhs_collector"]
