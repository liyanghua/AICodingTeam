[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "taobao-collector"
version = "0.1.0"
description = "Manual-login Taobao mobile image collector"
requires-python = ">=3.11,<3.14"
readme = "README.md"

[project.scripts]
taobao-collector = "taobao_collector.cli:main"

[tool.setuptools]
packages = ["taobao_collector"]
