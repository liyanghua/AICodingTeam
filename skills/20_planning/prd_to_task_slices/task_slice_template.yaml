slice_id: semantic_id
type: vertical_slice
title: Business-readable title
blocked_by: []
covers:
  - acceptance_criterion_id
vertical_path:
  - data_contract
  - service_or_runtime
  - api_or_cli
  - ui_or_artifact
  - tests
allowed_paths:
  - growth_dev/
  - dashboard/
  - domains/
  - tests/
expected_artifacts:
  - tasks/current/eval.md
verification_commands:
  - python3 -m unittest discover -s tests -v
acceptance:
  - Observable behavior criterion.
  - Regression or quality criterion.
do_not:
  - Do not change unrelated runtime behavior.
  - Do not write secrets to artifacts.
