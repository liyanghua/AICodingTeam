nodes:
- id: define_scope
  name: 确定分析边界
  type: form_collect
  depends_on: []
  data_requirements: []
  outputs:
  - market_insight_project_definition
  rules: []
- id: collect_top_products
  name: 行业大盘与热销商品分析
  type: data_collect
  depends_on:
  - define_scope
  data_requirements:
  - category_top_products_300
  outputs:
  - top_300_product_analysis_table
  rules: []
- id: analyze_hot_product_genes
  name: 爆款基因提炼
  type: compute_and_llm_extract
  depends_on:
  - collect_top_products
  data_requirements: []
  outputs:
  - hot_product_gene_table
  rules: []
- id: collect_keywords
  name: 关键词需求分析
  type: data_collect
  depends_on:
  - define_scope
  data_requirements:
  - category_keywords_top300
  outputs:
  - keyword_demand_breakdown_table
  - keyword_root_top20_table
  rules: []
- id: collect_reviews_qa
  name: 评价与问大家痛点分析
  type: data_collect
  depends_on:
  - collect_top_products
  data_requirements:
  - competitor_reviews_qa
  outputs:
  - review_qa_painpoint_table
  rules: []
- id: analyze_price_band
  name: 价格带与利润空间分析
  type: compute
  depends_on:
  - collect_top_products
  data_requirements:
  - price_band_distribution
  outputs:
  - price_band_opportunity_table
  rules: []
- id: analyze_competitors
  name: 竞品与竞店格局分析
  type: multi_source_analysis
  depends_on:
  - collect_top_products
  - collect_reviews_qa
  data_requirements:
  - competitor_landscape
  outputs:
  - competitor_landscape_table
  rules: []
- id: collect_cross_platform_trends
  name: 跨平台趋势机会分析
  type: external_research
  depends_on:
  - define_scope
  - collect_keywords
  data_requirements:
  - cross_platform_trend_signals
  outputs:
  - cross_platform_trend_table
  rules: []
- id: score_opportunities
  name: 机会判断与产品创新设计
  type: scoring
  depends_on:
  - analyze_hot_product_genes
  - collect_keywords
  - collect_reviews_qa
  - analyze_price_band
  - analyze_competitors
  - collect_cross_platform_trends
  data_requirements: []
  outputs:
  - product_opportunity_score_table
  rules: []
- id: generate_listing_plan
  name: 产品开发与链接规划落地
  type: business_plan_generation
  depends_on:
  - score_opportunities
  data_requirements: []
  outputs:
  - product_development_listing_plan
  rules: []
