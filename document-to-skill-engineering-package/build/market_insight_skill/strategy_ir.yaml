  七、适用子场景分别输出: "## 子场景1：淘宝 / 天猫新品开发\n\n### 适用情况\n\n准备开发新品，但不知道做什么产品、什么价格、什么卖点、什么人群。\n\
    \n### 执行流程\n\n1.  看行业前300，找主流产品结构。\n    \n2.  看关键词TOP300，找需求结构。\n    \n3.  看评价问大家，找痛点和升级点。\n\
    \    \n4.  看价格带，判断新品切入区间。\n    \n5.  看竞品，确定对标对象。\n    \n6.  做机会评分。\n    \n7. \
    \ 输出新品开发立项表。\n    \n\n### 关键判断\n\n新品不是凭感觉开发，而是要满足：\n\n**有搜索需求 + 有热销验证 + 有痛点可升级 + 有价格带空间 + 有竞品可对标。**\n\
    \n---\n\n## 子场景2：爆款机会挖掘\n\n### 适用情况\n\n想找下一个有机会打爆的产品。\n\n### 执行流程\n\n1.  看飙升大盘。\n\
    \    \n2.  看飙升关键词。\n    \n3.  看飙升产品。\n    \n4.  看飙升店铺。\n    \n5.  拆爆款基因。\n   \
    \ \n6.  判断对手强弱。\n    \n7.  快速找供应链或做微创新。\n    \n\n### 关键判断\n\n优先选择：\n\n| 机会类型 |\
    \ 判断 |\n| --- | --- |\n| 趋势词增长快 | 需求正在起来 |\n| 小店也能卖爆 | 竞争壁垒不高 |\n| 竞品视觉差 | 主图有突破机会\
    \ |\n| 竞品差评集中 | 产品升级有机会 |\n| 供给少 | 可以抢第一波红利 |\n\n---\n\n## 子场景3：类目市场分析\n\n###\
    \ 适用情况\n\n进入新类目，或判断一个类目是否值得做。\n\n### 执行流程\n\n1.  明确类目边界。\n    \n2.  导出行业前300。\n\
    \    \n3.  统计产品类型、价格带、材质、风格、场景。\n    \n4.  拆关键词需求。\n    \n5.  看头部店铺结构。\n    \n\
    6.  判断市场集中度和竞争强度。\n    \n7.  输出类目机会结论。\n    \n\n### 关键结论格式\n\n这个类目是否值得做，要回答：\n\
    \n1.  体量够不够？\n    \n2.  增长是否存在？\n    \n3.  竞争是否过强？\n    \n4.  是否有细分人群？\n    \n\
    5.  是否有细分场景？\n    \n6.  是否有价格带空白？\n    \n7.  我们有没有优势？\n    \n\n---\n\n## 子场景4：主图与视觉策划\n\
    \n### 适用情况\n\n产品已经确定，需要规划主图表达。\n\n### 执行流程\n\n1.  收集行业TOP50主图。\n    \n2.  拆主图背景、构图、文案、场景、卖点。\n\
    \    \n3.  找主图共性。\n    \n4.  找主图同质化程度。\n    \n5.  结合关键词和评价确定第一点击理由。\n    \n6.\
    \  输出主图策划方向。\n    \n\n### 关键判断\n\n主图不是设计师凭审美做，而是由 5 件事决定：\n\n**入口关键词、人群需求、第一点击理由、竞品差异、产品优势。**\n\
    \n### 输出模板\n\n| 主图版本 | 目标人群 | 流量入口 | 第一点击理由 | 画面表达 | 文案 | 对标竞品 | 测试指标 |\n| ---\
    \ | --- | --- | --- | --- | --- | --- | --- |\n\n---\n\n## 子场景5：竞品分析\n\n### 适用情况\n\
    \n准备打某个对手，或者链接增长遇到瓶颈。\n\n### 执行流程\n\n1.  找同类目、同人群、同价格带竞品。\n    \n2.  拆基础信息、SKU、价格、卖点。\n\
    \    \n3.  拆主图和详情页。\n    \n4.  拆评价问大家。\n    \n5.  拆流量结构。\n    \n6.  做客服对比。\n \
    \   \n7.  输出我方突破策略。\n    \n\n### 关键结论格式\n\n| 竞品优势 | 竞品弱点 | 我方机会 | 执行动作 |\n| ---\
    \ | --- | --- | --- |\n\n---\n\n## 子场景6：价格带布局\n\n### 适用情况\n\n不知道产品卖高价、中价还是低价，或者店铺产品结构混乱。\n\
    \n### 执行流程\n\n1.  把行业TOP300按价格分层。\n    \n2.  统计每个价格带销量和GMV。\n    \n3.  看每个价格带竞品数量。\n\
    \    \n4.  核算我方成本和毛利。\n    \n5.  匹配产品角色。\n    \n6.  输出价格带布局表。\n    \n\n### 关键判断\n\
    \n| 目标 | 价格策略 |\n| --- | --- |\n| 要流量 | 布局低价引流款 |\n| 要爆款 | 布局中价主推款 |\n| 要利润 |\
    \ 布局高价利润款 |\n| 要测试 | 布局空白价格带机会款 |\n\n---\n\n## 子场景7：产品升级与迭代\n\n### 适用情况\n\n已有老品，但增长乏力、转化不稳、差评集中。\n\
    \n### 执行流程\n\n1.  分析自己链接评价和售后。\n    \n2.  分析竞品评价和问大家。\n    \n3.  找高频痛点。\n    \n\
    4.  判断哪些痛点可以产品升级。\n    \n5.  判断哪些痛点可以视觉表达解决。\n    \n6.  判断哪些痛点可以客服话术解决。\n    \n\
    7.  输出产品迭代方案。\n    \n\n### 关键判断\n\n| 痛点类型 | 解决方式 |\n| --- | --- |\n| 产品硬伤 | 改材质、工艺、结构\
    \ |\n| 认知不清 | 改主图、详情页 |\n| 购买顾虑 | 改客服话术、承诺 |\n| 使用误解 | 增加说明书、详情页解释 |\n| 竞品没解决\
    \ | 做成核心差异卖点 |\n\n---\n\n## 子场景8：季节性产品提前布局\n\n### 适用情况\n\n类目存在明显季节变化，例如沙发垫、服饰、防晒衣、家纺。\n\
    \n### 执行流程\n\n1.  找去年同期热销商品。\n    \n2.  找当季热销商品。\n    \n3.  统计材质、颜色、功能、场景变化。\n\
    \    \n4.  判断季节性启动时间。\n    \n5.  提前规划供应链和上新节奏。\n    \n6.  输出季节性产品布局表。\n    \n\n\
    ### 案例参考\n\n沙发垫文档中明确提到：夏季爆发时间段是4-6月，冬季爆发时间段是10-12月；夏季材质包括麻将席、冰丝、凉豆豆，冬季材质包括兔毛绒、舒棉绒、羊羔绒，四季材质包括雪尼尔、水洗棉、半边绒。\n\
    \n### 输出模板\n\n| 季节 | 爆发月份 | 主流材质 | 主流风格 | 主流场景 | 提前上新时间 | 产品动作 |\n| --- | ---\
    \ | --- | --- | --- | --- | --- |\n\n---"
  八、最终总结: "这套市场洞察方法论可以概括为一句话：\n\n**从全域趋势中找方向，从行业数据中找主流，从关键词中找需求，从评价问大家中找痛点，从价格带中找利润，从竞品中找突破，最后落到产品开发和链接规划。**\n\
    \n完整执行逻辑是：\n\n**看全域 → 看行业 → 看关键词 → 看用户反馈 → 看价格带 → 看竞品 → 找机会 → 做创新 → 立项开发 → 链接落地。**\n\
    \n真正可落地的市场洞察，最后必须输出三个东西：\n\n1.  **机会判断**：这个机会为什么值得做？\n    \n2.  **产品方案**：具体做什么产品，什么材质、功能、风格、价格？\n\
    \    \n3.  **链接规划**：给谁卖，怎么表达，打哪个竞品，测什么指标？\n    \n\n最终标准不是“报告写得完整”，而是：\n\n**运营看完知道做什么，产品看完知道怎么开发，设计看完知道怎么画主图，老板看完知道为什么值得投入。**"
