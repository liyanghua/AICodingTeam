type: object
required:
  - evidence_id
  - skill_run_id
  - step_id
  - claim
  - evidence_type
  - source_data
properties:
  evidence_id:
    type: string
  skill_run_id:
    type: string
  step_id:
    type: string
  claim:
    type: string
  evidence_type:
    type: string
    enum:
      - raw_api_response
      - browser_export_file
      - screenshot
      - computed_statistic
      - llm_classification
      - human_review
  source_data:
    type: array
  computation:
    type: object
  rule_hit:
    type: object
  confidence:
    type: number
    minimum: 0
    maximum: 1
